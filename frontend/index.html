<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Поиск аудиторий</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700&display=swap');
    body { font-family: 'Montserrat', sans-serif; }
  </style>
</head>
<body class="bg-[#c2c2c2] min-h-screen w-full flex flex-col items-center justify-start p-4 md:p-8 select-none">

<div class="w-full max-w-4xl flex flex-col gap-6">

  <div class="bg-black text-white rounded-[42px] p-6 md:p-8 flex flex-col gap-8 w-full shadow-lg">
    <div class="flex justify-between items-start w-full">
      <div>
        <h1 id="time-lesson-header" class="text-[33px] md:text-[36px] font-bold tracking-tight uppercase leading-none">
          11:20 / 2 ПАРА
        </h1>
        <p id="time-sub-header" class="text-gray-400 text-[14px] md:text-[16px] font-bold mt-2 uppercase tracking-wider">
          ДО КОНЦА ПАРЫ: 01:20
        </p>
      </div>
      <div class="text-right">
        <p id="date-header" class="text-[24px] md:text-[32px] font-bold tracking-tight leading-none">01.09</p>
        <p id="week-header" class="text-gray-400 text-[14px] md:text-[16px] font-bold mt-2 uppercase tracking-wider">
          ЧЕТНАЯ Н.
        </p>
      </div>
    </div>

    <div class="bg-[#e0e0e0] p-1 rounded-[24px] flex relative w-full h-[64px] items-center">
      <button type="button" id="btn_motor" class="w-1/2 h-full rounded-[20px] bg-[#595959] text-white font-bold text-[16px] md:text-[18px] uppercase tracking-wider transition-all duration-200 focus:outline-none">
        АВИАМОТОРНАЯ
      </button>
      <button type="button" id="btn_narod" class="w-1/2 h-full rounded-[20px] text-[#595959] font-bold text-[16px] md:text-[18px] uppercase tracking-wider transition-all duration-200 focus:outline-none">
        НАРОДНОЕ
      </button>
    </div>
  </div>

  <div class="bg-black text-white rounded-[42px] py-8 md:py-10 grid grid-cols-1 md:grid-cols-2 gap-8 w-full shadow-lg">
    <div class="pl-6 md:pl-8 flex flex-col justify-center">
      <p class="text-gray-400 text-[12px] md:text-[14px] font-bold uppercase tracking-wider mb-2">Свободно</p>
      <p id="free" class="text-[32px] md:text-[42px] font-bold text-white leading-none">0</p>
    </div>
    <div class="flex flex-col justify-center md:border-l md:border-gray-800 pl-6 md:pl-8">
      <p class="text-gray-400 text-[12px] md:text-[14px] font-bold uppercase tracking-wider mb-2">Занято</p>
      <p id="busy" class="text-[32px] md:text-[42px] font-bold text-white leading-none">0</p>
    </div>
  </div>

  <form id="search" class="bg-black text-white rounded-[42px] p-6 md:p-8 grid grid-cols-1 md:grid-cols-2 gap-8 w-full shadow-lg">
    <input type="hidden" name="building" id="building_input" value="А">

    <div class="flex flex-col w-full">
      <h2 class="text-[22px] md:text-[26px] font-bold tracking-tight uppercase mb-4 leading-tight">
        ПО ЗАПРОСУ<br>НАЙДЕНО:
      </h2>
      <div id="results" class="flex flex-col gap-4 overflow-y-auto max-h-[380px] pr-2">
      </div>
    </div>

    <div class="flex flex-col gap-5 w-full md:border-l md:border-gray-800 md:pl-8">
      <div class="flex flex-col gap-2">
        <label class="text-[18px] md:text-[20px] font-bold uppercase tracking-wide">ДАТА:</label>
        <input type="date" name="date" id="date_input" class="bg-[#1a1a1a] border border-gray-700 rounded-xl h-[50px] px-4 font-bold text-[16px] text-white focus:outline-none focus:border-gray-500 w-full">
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[18px] md:text-[20px] font-bold uppercase tracking-wide">ЭТАЖ:</label>
        <select name="floor" class="bg-[#1a1a1a] border border-gray-700 rounded-xl h-[50px] px-4 font-bold text-[16px] text-white focus:outline-none focus:border-gray-500">
          <option value="1">1</option>
          <option value="2">2</option>
          <option value="3">3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[18px] md:text-[20px] font-bold uppercase tracking-wide">ВРЕМЯ (ПАРА):</label>
        <div class="bg-[#1a1a1a] border border-gray-700 rounded-xl p-4 flex flex-col gap-3 max-h-[160px] overflow-y-auto">
          <label class="flex items-center gap-3 cursor-pointer select-none font-bold text-[14px]">
            <input type="checkbox" name="lessons" value="1" class="w-5 h-5 rounded accent-gray-500 bg-gray-800 border-gray-700">
            <span>1 пара (09:30 - 11:00)</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer select-none font-bold text-[14px]">
            <input type="checkbox" name="lessons" value="2" class="w-5 h-5 rounded accent-gray-500 bg-gray-800 border-gray-700">
            <span>2 пара (11:15 - 12:45)</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer select-none font-bold text-[14px]">
            <input type="checkbox" name="lessons" value="3" class="w-5 h-5 rounded accent-gray-500 bg-gray-800 border-gray-700">
            <span>3 пара (13:00 - 14:30)</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer select-none font-bold text-[14px]">
            <input type="checkbox" name="lessons" value="4" class="w-5 h-5 rounded accent-gray-500 bg-gray-800 border-gray-700">
            <span>4 пара (15:10 - 16:40)</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer select-none font-bold text-[14px]">
            <input type="checkbox" name="lessons" value="5" class="w-5 h-5 rounded accent-gray-500 bg-gray-800 border-gray-700">
            <span>5 пара (16:55 - 18:25)</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer select-none font-bold text-[14px]">
            <input type="checkbox" name="lessons" value="6" class="w-5 h-5 rounded accent-gray-500 bg-gray-800 border-gray-700">
            <span>6 пара (18:40 - 20:10)</span>
          </label>
          <label class="flex items-center gap-3 cursor-pointer select-none font-bold text-[14px]">
            <input type="checkbox" name="lessons" value="7" class="w-5 h-5 rounded accent-gray-500 bg-gray-800 border-gray-700">
            <span>7 пара (20:25 - 21:55)</span>
          </label>
        </div>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[18px] md:text-[20px] font-bold uppercase tracking-wide">РАЗМЕР:</label>
        <select name="size" class="bg-[#1a1a1a] border border-gray-700 rounded-xl h-[50px] px-4 font-bold text-[16px] text-white focus:outline-none focus:border-gray-500">
          <option value="S">Маленькая</option>
          <option value="M" selected >Семинарская</option>
          <option value="L">Лекционная</option>
        </select>
      </div>
    </div>
  </form>

</div>

<div id="booking" class="fixed inset-0 bg-black/70 flex items-center justify-center hidden z-50 p-4">
  <div class="bg-black text-white rounded-[32px] p-6 md:p-8 max-w-md w-full border border-gray-800 flex flex-col gap-6 shadow-2xl text-center">
    <div>
      <p id="modal_window" class="text-white text-[16px] md:text-[18px] font-bold uppercase tracking-wider">
        Аудитория успешно забронирована
      </p>
    </div>
    <button type="button" id="close_modal" class="w-full h-[54px] rounded-[20px] bg-[#595959] hover:bg-[#444444] text-white font-bold text-[16px] uppercase tracking-wider transition-all duration-200 focus:outline-none">
      ОТЛИЧНО
    </button>
  </div>
</div>

<script src="/static/index.js"></script>

</body>
</html>
